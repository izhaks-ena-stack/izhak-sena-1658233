<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explora Minas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="d-flex flex-column min-vh-100">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
  <div class="container">
    <img src="assets/img/logo.png" alt="Logo" width="40" class="me-2">
    <a class="navbar-brand fw-bold" href="index.html"> Explora Minas</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#destaques">Destaques</a></li>
        <li class="nav-item"><a class="nav-link" href="#cidades">Cidades</a></li>
        <li class="nav-item"><a class="nav-link" href="#sobre">Sobre</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="flex-fill">

  <!-- Seção 1: Carrossel de destaques -->
  <section id="destaques" class="mb-5">
    <div class="container mt-4">
      <h3 class="mb-3">🌟 Cidades em Destaque</h3>
    </div>
    <div id="carrossel" class="carousel slide" data-bs-ride="carousel">
      <div class="carousel-inner" id="carrossel-inner">
        <!-- Preenchido pelo JS -->
      </div>
      <button class="carousel-control-prev" type="button" data-bs-target="#carrossel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#carrossel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
      </button>
    </div>
  </section>

  <!-- Seção 2: Todos os cards -->
  <section id="cidades" class="container mb-5">
    <h3 class="mb-4">🗺️ Todas as Cidades</h3>
    <div class="row" id="cards-container">
      <!-- Preenchido pelo JS -->
    </div>
  </section>

  <!-- Seção 3: Sobre o autor -->
  <section id="sobre" class="bg-light py-4 mb-0">
    <div class="container text-center">
      
      <p class="mb-1"><strong>Izhak Sena</strong></p>
      
      <p class="text-muted">Trabalho Prático 1 – Exibição e navegação dinâmicas</p>
    </div>
  </section>

</main>

<!-- Footer -->
<footer class="bg-success text-white text-center py-3">
  <p class="mb-0">© 2026 Explora Minas · Feito por Izhak Sena</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>
